<div class="player-boost side-{{side}} {{stateClass}}" style="--team-color: {{teamColor}}; --team-contrast: {{teamContrast}}; --boost-percent: {{boostPercent}}">
  <div class="boost-ring">
    <svg class="boost-meter" viewBox="0 0 100 100" aria-hidden="true">
      <circle class="boost-track" cx="50" cy="50" r="43" pathLength="100"></circle>
      <circle class="boost-progress" cx="50" cy="50" r="43" pathLength="100"></circle>
    </svg>
    <div class="boost-core">
      <span class="boost-value">{{boostValue}}</span>
    </div>
  </div>
  <div class="name-tag {{nameState}}">
    <span class="player-name">{{playerName}}</span>
  </div>
</div>
