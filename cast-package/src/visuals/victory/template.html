<div class="ge-event ge-victory is-hidden" data-event-root>
  <div class="ge-jaw" aria-hidden="true">
    <span class="ge-slab ge-slab-1"></span>
    <span class="ge-slab ge-slab-2"></span>
    <span class="ge-slab ge-slab-3"></span>
    <span class="ge-slab ge-slab-4"></span>
    <span class="ge-slab ge-slab-5"></span>
    <span class="ge-slab ge-slab-6"></span>
  </div>
  <main class="ge-card" aria-live="polite">
    <div class="ge-rule ge-rule-top"></div>
    <p class="ge-kicker" data-kicker>Match won</p>
    <h1 class="ge-title" data-title>Victory</h1>
    <p class="ge-team" data-team>Team</p>
    <div class="ge-meta">
      <span data-scoreline></span>
      <span data-detail></span>
    </div>
    <div class="ge-rule ge-rule-bottom"></div>
  </main>
</div>
