<section class="{{rootClass}}" style="--team-color:{{teamColor}}">
  <header class="record-header">
    <div class="player-name">{{playerName}}</div>
    <div class="record-context">{{context}}</div>
  </header>
  <div class="record-stats">
    <div class="stat stat-wins">
      <div class="stat-value">{{wins}}</div>
      <div class="stat-label">W</div>
    </div>
    <div class="stat stat-losses">
      <div class="stat-value">{{losses}}</div>
      <div class="stat-label">L</div>
    </div>
    <div class="stat stat-streak">
      <div class="stat-value">{{streak}}</div>
      <div class="stat-label">STK</div>
    </div>
  </div>
</section>
