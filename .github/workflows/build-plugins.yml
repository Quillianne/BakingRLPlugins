name: Build BakingRL Plugins

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: bakingrl-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-plugins:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 30

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout plugins
        uses: actions/checkout@v6
        with:
          path: BakingRLPlugins

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: BakingRLPlugins/package-lock.json

      - name: Install plugin dependencies
        working-directory: BakingRLPlugins
        run: npm ci

      - name: Check plugins
        working-directory: BakingRLPlugins
        run: npm run check

      - name: Build plugins
        working-directory: BakingRLPlugins
        run: npm run build

      - name: Validate plugins
        working-directory: BakingRLPlugins
        run: npm run validate

      - name: Write plugin signing key
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BAKINGRL_PLUGIN_SIGNING_KEY_JSON)) {
            Write-Error "Missing BAKINGRL_PLUGIN_SIGNING_KEY_JSON secret."
            exit 1
          }
          $keyPath = Join-Path $env:RUNNER_TEMP "bakingrl-plugin-signing-key.json"
          Set-Content -Path $keyPath -Value $env:BAKINGRL_PLUGIN_SIGNING_KEY_JSON -NoNewline -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "BAKINGRL_PLUGIN_SIGNING_KEY=$keyPath"
        env:
          BAKINGRL_PLUGIN_SIGNING_KEY_JSON: ${{ secrets.BAKINGRL_PLUGIN_SIGNING_KEY_JSON }}

      - name: Pack signed plugin bundles
        working-directory: BakingRLPlugins
        run: |
          npm run pack --workspace @bakingrl-plugins/scoreboard -- --sign "$env:BAKINGRL_PLUGIN_SIGNING_KEY"
          npm run pack --workspace @bakingrl-plugins/bo-tracker -- --sign "$env:BAKINGRL_PLUGIN_SIGNING_KEY"
          npm run pack --workspace @bakingrl-plugins/cage-stats -- --sign "$env:BAKINGRL_PLUGIN_SIGNING_KEY"

      - name: Remove plugin signing key
        if: always()
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:BAKINGRL_PLUGIN_SIGNING_KEY) -and (Test-Path $env:BAKINGRL_PLUGIN_SIGNING_KEY)) {
            Remove-Item -Force $env:BAKINGRL_PLUGIN_SIGNING_KEY
          }

      - name: List plugin bundles
        working-directory: BakingRLPlugins
        run: Get-ChildItem -Path . -Recurse -Filter *.brlp | Where-Object { $_.FullName -like "*dist-bundles*" } | ForEach-Object { $_.FullName }

      - name: Upload plugin bundles
        uses: actions/upload-artifact@v7
        with:
          name: BakingRL-plugins-${{ github.ref_name }}
          path: BakingRLPlugins/*/dist-bundles/*.brlp
          if-no-files-found: error
          retention-days: 14
