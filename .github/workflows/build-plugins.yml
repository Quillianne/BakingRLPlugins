name: Build BakingRL Plugins

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "plugins-v*"

permissions:
  contents: write

concurrency:
  group: bakingrl-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout plugins
        uses: actions/checkout@v6
        with:
          path: BakingRLPlugins

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: BakingRLPlugins/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install plugin dependencies
        working-directory: BakingRLPlugins
        run: npm ci

      - name: Check plugins
        working-directory: BakingRLPlugins
        run: npm run check

      - name: Build plugins
        working-directory: BakingRLPlugins
        run: npm run build

      - name: Validate plugins
        working-directory: BakingRLPlugins
        run: npm run validate

      - name: Validate marketplace listings
        working-directory: BakingRLPlugins
        run: npm run validate:listing

      - name: Write plugin signing key
        run: |
          if [ -z "${BAKINGRL_PLUGIN_SIGNING_KEY_JSON:-}" ]; then
            echo "::error::Missing BAKINGRL_PLUGIN_SIGNING_KEY_JSON secret."
            exit 1
          fi
          key_path="$RUNNER_TEMP/bakingrl-plugin-signing-key.json"
          printf '%s' "$BAKINGRL_PLUGIN_SIGNING_KEY_JSON" > "$key_path"
          chmod 600 "$key_path"
          echo "BAKINGRL_PLUGIN_SIGNING_KEY=$key_path" >> "$GITHUB_ENV"
        env:
          BAKINGRL_PLUGIN_SIGNING_KEY_JSON: ${{ secrets.BAKINGRL_PLUGIN_SIGNING_KEY_JSON }}

      - name: Pack signed plugin bundles
        working-directory: BakingRLPlugins
        run: npm run pack --workspaces --if-present -- --sign "$BAKINGRL_PLUGIN_SIGNING_KEY"

      - name: Remove plugin signing key
        if: always()
        run: |
          if [ -n "${BAKINGRL_PLUGIN_SIGNING_KEY:-}" ] && [ -f "$BAKINGRL_PLUGIN_SIGNING_KEY" ]; then
            rm -f -- "$BAKINGRL_PLUGIN_SIGNING_KEY"
          fi

      - name: List plugin bundles
        working-directory: BakingRLPlugins
        run: find . -path "*/dist-bundles/*.brlp" -type f -print

      - name: Upload plugin bundles
        uses: actions/upload-artifact@v7
        with:
          name: BakingRL-plugins-${{ github.ref_name }}
          path: BakingRLPlugins/*/dist-bundles/*.brlp
          if-no-files-found: error
          retention-days: 14

      - name: Publish plugin release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BakingRLPlugins/*/dist-bundles/*.brlp
          fail_on_unmatched_files: true
