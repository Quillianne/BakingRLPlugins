name: Build BakingRL Plugins

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "plugins-v*"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bakingrl-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-plugins:
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 30

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout plugins
        uses: actions/checkout@v6
        with:
          path: BakingRLPlugins

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: BakingRLPlugins/package-lock.json

      - name: Install plugin dependencies
        working-directory: BakingRLPlugins
        run: npm ci

      - name: Check plugins
        working-directory: BakingRLPlugins
        run: npm run check

      - name: Build plugins
        working-directory: BakingRLPlugins
        run: npm run build

      - name: Validate plugins
        working-directory: BakingRLPlugins
        run: npm run validate

      - name: Validate marketplace listings
        working-directory: BakingRLPlugins
        run: npm run validate:listing

      - name: Write plugin signing key
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BAKINGRL_PLUGIN_SIGNING_KEY_JSON)) {
            Write-Error "Missing BAKINGRL_PLUGIN_SIGNING_KEY_JSON secret."
            exit 1
          }
          $keyPath = Join-Path $env:RUNNER_TEMP "bakingrl-plugin-signing-key.json"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText($keyPath, $env:BAKINGRL_PLUGIN_SIGNING_KEY_JSON, $utf8NoBom)
          Add-Content -Path $env:GITHUB_ENV -Value "BAKINGRL_PLUGIN_SIGNING_KEY=$keyPath"
        env:
          BAKINGRL_PLUGIN_SIGNING_KEY_JSON: ${{ secrets.BAKINGRL_PLUGIN_SIGNING_KEY_JSON }}

      - name: Pack signed plugin bundles
        working-directory: BakingRLPlugins
        run: npm run pack --workspaces --if-present -- --sign "$env:BAKINGRL_PLUGIN_SIGNING_KEY"

      - name: Remove plugin signing key
        if: always()
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:BAKINGRL_PLUGIN_SIGNING_KEY) -and (Test-Path $env:BAKINGRL_PLUGIN_SIGNING_KEY)) {
            Remove-Item -Force $env:BAKINGRL_PLUGIN_SIGNING_KEY
          }

      - name: List plugin bundles
        working-directory: BakingRLPlugins
        run: Get-ChildItem -Path . -Recurse -Filter *.brlp | Where-Object { $_.FullName -like "*dist-bundles*" } | ForEach-Object { $_.FullName }

      - name: Upload plugin bundles
        uses: actions/upload-artifact@v7
        with:
          name: BakingRL-plugins-${{ github.ref_name }}
          path: BakingRLPlugins/*/dist-bundles/*.brlp
          if-no-files-found: error
          retention-days: 14

      - name: Publish plugin release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BakingRLPlugins/*/dist-bundles/*.brlp
          fail_on_unmatched_files: true

      - name: Checkout marketplace
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v6
        with:
          repository: Quillianne/BakingRLMarketplace
          token: ${{ secrets.BAKINGRL_MARKETPLACE_UPDATE_TOKEN }}
          path: BakingRLMarketplace

      - name: Generate marketplace entries
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: BakingRLPlugins
        run: |
          $marketplacePackages = Resolve-Path "..\BakingRLMarketplace\packages"
          $repo = "${{ github.repository }}"
          $tag = "${{ github.ref_name }}"
          $pluginDirs = @("cast-package", "cage-stats", "deja-vu")
          foreach ($pluginDir in $pluginDirs) {
            $manifest = Get-Content -Raw -Path "$pluginDir\bakingrl.plugin.json" | ConvertFrom-Json
            $bundleName = "$($manifest.id)-$($manifest.version).brlp"
            $bundleUrl = "https://github.com/$repo/releases/download/$tag/$bundleName"
            $listingUrl = "https://raw.githubusercontent.com/$repo/$tag/$pluginDir/marketplace/listing.json"
            $output = Join-Path $marketplacePackages "$($manifest.id).json"
            npm exec -- bakingrl-plugin marketplace-entry $pluginDir --developer quillianne --bundle-url $bundleUrl --listing-url $listingUrl --output $output
          }

      - name: Validate marketplace PR payload
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: BakingRLMarketplace
        run: npm ci; npm run validate

      - name: Open marketplace update PR
        if: startsWith(github.ref, 'refs/tags/')
        uses: peter-evans/create-pull-request@v7
        with:
          path: BakingRLMarketplace
          token: ${{ secrets.BAKINGRL_MARKETPLACE_UPDATE_TOKEN }}
          branch: update/bakingrl-plugins-${{ github.ref_name }}
          title: "Update BakingRL plugin marketplace entries for ${{ github.ref_name }}"
          commit-message: "chore: update plugin marketplace entries for ${{ github.ref_name }}"
          body: |
            Generated from BakingRLPlugins ${{ github.ref_name }}.

            Review the bundle hashes, signing keys, permissions, and curation sections before merging.
