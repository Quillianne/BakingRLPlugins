name: Build BakingRL Plugins

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: bakingrl-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout plugins
        uses: actions/checkout@v6
        with:
          path: BakingRLPlugins

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: BakingRLPlugins/package-lock.json

      - name: Install plugin dependencies
        working-directory: BakingRLPlugins
        run: npm ci

      - name: Check plugins
        working-directory: BakingRLPlugins
        run: npm run check

      - name: Build plugins
        working-directory: BakingRLPlugins
        run: npm run build

      - name: Validate plugins
        working-directory: BakingRLPlugins
        run: npm run validate

      - name: Write plugin signing key
        run: |
          if [ -z "${BAKINGRL_PLUGIN_SIGNING_KEY_JSON}" ]; then
            echo "Missing BAKINGRL_PLUGIN_SIGNING_KEY_JSON secret." >&2
            exit 1
          fi
          key_path="${RUNNER_TEMP}/bakingrl-plugin-signing-key.json"
          printf '%s' "${BAKINGRL_PLUGIN_SIGNING_KEY_JSON}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "BAKINGRL_PLUGIN_SIGNING_KEY=${key_path}" >> "${GITHUB_ENV}"
        env:
          BAKINGRL_PLUGIN_SIGNING_KEY_JSON: ${{ secrets.BAKINGRL_PLUGIN_SIGNING_KEY_JSON }}

      - name: Pack signed plugin bundles
        working-directory: BakingRLPlugins
        run: |
          npm run pack --workspace @bakingrl-plugins/scoreboard -- --sign "${BAKINGRL_PLUGIN_SIGNING_KEY}"
          npm run pack --workspace @bakingrl-plugins/bo-tracker -- --sign "${BAKINGRL_PLUGIN_SIGNING_KEY}"
          npm run pack --workspace @bakingrl-plugins/cage-stats -- --sign "${BAKINGRL_PLUGIN_SIGNING_KEY}"

      - name: Remove plugin signing key
        if: always()
        run: |
          if [ -n "${BAKINGRL_PLUGIN_SIGNING_KEY:-}" ]; then
            rm -f "${BAKINGRL_PLUGIN_SIGNING_KEY}"
          fi

      - name: List plugin bundles
        working-directory: BakingRLPlugins
        run: find . -path "*/dist-bundles/*.brlp" -print

      - name: Upload plugin bundles
        uses: actions/upload-artifact@v7
        with:
          name: BakingRL-plugins-${{ github.ref_name }}
          path: BakingRLPlugins/*/dist-bundles/*.brlp
          if-no-files-found: error
          retention-days: 14
