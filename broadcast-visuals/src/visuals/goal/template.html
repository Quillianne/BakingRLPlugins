<div class="ge-event ge-goal is-hidden" data-event-root>
  {{transitionJaws}}
  <main class="ge-card" aria-live="polite">
    <div class="ge-rule ge-rule-top"></div>
    <p class="ge-kicker" data-kicker>Goal</p>
    <h1 class="ge-title" data-player>Player</h1>
    <p class="ge-team" data-team>Team</p>
    <div class="ge-meta">
      <span data-assist></span>
      <span data-speed></span>
    </div>
    <div class="ge-rule ge-rule-bottom"></div>
  </main>
</div>
